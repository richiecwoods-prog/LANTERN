<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>THL MOTH AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="topbar">
    <strong>THL MOTH AI</strong>
    <span id="status">READY</span>
    <label class="upload">Upload MOTH File<input id="file" type="file" accept=".csv,.json,.geojson" /></label>
  </div>
  <div id="map"></div>
  <div id="panel">
    <h3>Antenna Site Candidates</h3>
    <div id="summary">Upload a georeferenced MOTH file.</div>
    <ol id="candidates"></ol>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const center = {{ center | tojson }};
  </script>
  <script src="/static/app.js"></script>
</body>
</html>
