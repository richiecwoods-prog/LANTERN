<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><title>Back Office / Legacy</title>
<style>:root{--bg:#0b1220;--panel:#101a2b;--panel2:#16243a;--line:#2b3a52;--text:#e8eef7;--muted:#9fb0c5;--blue:#24669b;--good:#23a455;--amber:#d4a017;--bad:#d45050;--grey:#7a7f88}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif;line-height:1.42}.hero{padding:28px 24px 18px;background:#07101e;border-bottom:1px solid var(--line)}.wrap{max-width:1440px;margin:0 auto;padding:18px 24px}.hero .wrap{padding:0 24px}h1{margin:0;font-size:30px;letter-spacing:.04em}h2{font-size:18px;margin:0 0 10px}.sub,.small,.muted{color:var(--muted)}.sub{font-size:14px;margin-top:8px;max-width:980px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}.card{grid-column:span 6;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:15px;box-shadow:0 8px 20px rgba(0,0,0,.16)}.span-12{grid-column:span 12}.span-6{grid-column:span 6}@media(max-width:1000px){.card,.span-6{grid-column:span 12}}.btnrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.btn{display:inline-flex;align-items:center;justify-content:center;border:1px solid #316990;background:#1d4f7a;color:#fff;text-decoration:none;border-radius:8px;padding:9px 11px;font-size:13px;font-weight:800}.btn.secondary{background:#13233a;border-color:var(--line)}.btn:hover{filter:brightness(1.15)}.stack{display:flex;flex-direction:column;gap:8px}.stack a{display:block;text-decoration:none;color:#fff;background:#0d1727;border:1px solid var(--line);border-radius:8px;padding:10px}.stack a:hover{background:#153759;border-color:#2b6fa5}.stack b{display:block}.stack span{display:block;color:var(--muted);font-size:12px;margin-top:3px}.tag{display:inline-flex;border:1px solid #2f4565;border-radius:999px;padding:3px 7px;font-size:11px;color:#dcecff;margin:2px;background:#0d1727}.error{white-space:pre-wrap;background:#351b18;border:1px solid #803126;color:#ffd3ca;border-radius:8px;padding:10px}code{background:#0d1727;border:1px solid var(--line);padding:2px 5px;border-radius:6px;color:#e8f2ff}@media print{#eei-app-shell,.btnrow{display:none!important}body{background:#fff;color:#111}.hero,.card{box-shadow:none;background:#fff;color:#111}.sub,.small,.muted{color:#333}}</style>
  <link rel="stylesheet" href="/static/platform_shell.css?v=0134" />
</head><body><script data-eei-shell-early src="/static/platform_shell.js?v=0134"></script><section class="hero"><div class="wrap"><h1>Back Office / Legacy</h1><div class="sub">Compatibility aliases, raw payloads and developer support pages kept out of the main workflow.</div></div></section><main class="wrap">
<section class="grid"><div class="card span-12"><h2>Support boundary</h2><span class="tag">not customer lane</span><span class="tag">routes retained</span><span class="tag">main nav separated</span></div><div class="card span-6"><h2>Legacy aliases</h2><div id="legacyLinks" class="stack"><span class="small">Loading...</span></div></div><div class="card span-6"><h2>Raw payloads and tools</h2><div id="supportLinks" class="stack"><span class="small">Loading...</span></div></div></section>
</main>
<script>
const fallbackLegacy=[
  {title:'Legacy Flight Safety Alias',url:'/lantern?v=0122',canonical_url:'/reporting/flight-safety?v=0122',description:'Compatibility entry point for the reporting flight-safety brief.'},
  {title:'Legacy Mission Brief Static Page',url:'/static/mission_brief.html?v=092',canonical_url:'/reporting/mission-brief?v=0122',description:'Original static mission brief retained for comparison and recovery.'},
  {title:'Legacy J2 Static Page',url:'/static/j2_report.html?v=118',canonical_url:'/reporting/j2?v=0122',description:'Original static J2 report retained for comparison and recovery.'},
  {title:'Legacy RF Analysis Static Page',url:'/static/launch_analysis.html?v=075',canonical_url:'/engineering/rf?v=0122',description:'Original RF analysis page retained behind the canonical wrapper.'},
  {title:'Legacy Map Root',url:'/?v=0122',canonical_url:'/engineering/map?v=0122',description:'Original map root retained behind the Engineering map wrapper.'},
  {title:'API Payload Viewer',url:'/engineering/api-viewer?v=0122',canonical_url:'/system/back-office?v=0122',description:'Developer-facing endpoint and payload inspection.'},
  {title:'Deploy Check JSON',url:'/api/platform/deploy-check',canonical_url:'/system/deploy-check?v=0122',description:'Raw deploy readiness payload.'},
  {title:'Health JSON',url:'/api/platform/health',canonical_url:'/system/status?v=0122',description:'Raw platform health payload.'},
  {title:'Routes JSON',url:'/api/platform/routes',canonical_url:'/system/app-map?v=0122',description:'Raw registered-route payload.'}
];
const $=id=>document.getElementById(id);function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}async function json(url){const r=await fetch(url,{cache:'no-store'});if(!r.ok)throw new Error(url+' '+r.status);return r.json();}
function renderLinks(id,items){$(id).innerHTML=items.map(item=>`<a href="${esc(item.url)}"><b>${esc(item.title)}</b><span>${esc(item.description||'')}${item.canonical_url?`<br>Canonical: ${esc(item.canonical_url)}`:''}</span></a>`).join('')||'<span class="small">None registered.</span>';}
(async function(){try{const d=await json('/api/platform/navigation');const legacy=((d.sections&&d.sections.legacy)||fallbackLegacy);const support=legacy.filter(item=>String(item.url||'').startsWith('/api/')||String(item.key||'').includes('api')||String(item.title||'').toLowerCase().includes('json')||String(item.title||'').toLowerCase().includes('payload'));const aliases=legacy.filter(item=>!support.includes(item));renderLinks('legacyLinks',aliases);renderLinks('supportLinks',support);}catch(e){renderLinks('legacyLinks',fallbackLegacy.filter(item=>!String(item.url||'').startsWith('/api/')&&!String(item.title||'').toLowerCase().includes('json')&&!String(item.title||'').toLowerCase().includes('payload')));renderLinks('supportLinks',fallbackLegacy.filter(item=>String(item.url||'').startsWith('/api/')||String(item.title||'').toLowerCase().includes('json')||String(item.title||'').toLowerCase().includes('payload')));}})();
</script>
  <script src="/static/platform_shell.js?v=0134" defer></script>
</body></html>
